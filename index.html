<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gioco di Lore - Web App</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div id="game-container">
  <div id="sidebar">
    <h3>Gerarchia Semi</h3>
    <ul style="list-style:none; padding:0;">
      <li style="color:#f1c40f; font-weight:bold;">● ORI (400)</li>
      <li style="color:#3498db; font-weight:bold;">● SPADE (300)</li>
      <li style="color:#e74c3c; font-weight:bold;">● COPPE (200)</li>
      <li style="color:#2ecc71; font-weight:bold;">● BASTONI (100)</li>
    </ul>
    <hr>
    <div id="mini-scoreboard">
      <h4>Classifica</h4>
      <div id="score-list">-</div>
    </div>
  </div>

  <div id="game-table">
    <h1>Gioco di Lore</h1>
    <div id="setup-menu">
      <p>Numero giocatori:</p>
      <select id="select-players">
        <option value="3">3 Giocatori</option>
        <option value="4">4 Giocatori</option>
        <option value="5" selected>5 Giocatori</option>
        <option value="6">6 Giocatori</option>
      </select>
      <br><br>
      <button onclick="iniziaPartitaVera()">INIZIA PARTITA</button>
    </div>

    <div id="game-area" style="display:none;">
      <div id="info-bar">
        <span id="status-text">-</span>
        <div id="input-area" style="display:none; margin-left:10px;">
          <input type="number" id="bet-input" min="0" value="0" style="width:40px;">
          <button onclick="inviaDichiarazione()">OK</button>
        </div>
      </div>
      <div id="table-center">
        <div>Somma: <span id="current-sum">0</span> | Prese: <span id="prese-fatte">0</span></div>
        <div id="played-cards" style="min-height:130px; display:flex; justify-content:center; align-items:center; margin-top:10px;"></div>
      </div>
      <div id="player-area">
        <h3>Le tue carte:</h3>
        <div id="my-hand" style="min-height:120px; display:flex; justify-content:center;"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
